spring:
  application:
    name: fintransfer

  datasource:
    url: jdbc:postgresql://localhost:5432/fintransfer
    username: fintransfer
    password: fintransfer
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:mude-essa-chave-secreta-em-producao-use-uma-longa}
    expiration: 86400000

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5-20251001
  base-url: https://api.anthropic.com
