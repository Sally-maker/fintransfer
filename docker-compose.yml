services:
  postgres:
    image: postgres:16-alpine
    container_name: fintransfer-db
    environment:
      POSTGRES_DB: fintransfer
      POSTGRES_USER: fintransfer
      POSTGRES_PASSWORD: fintransfer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintransfer"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fintransfer-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fintransfer
      SPRING_DATASOURCE_USERNAME: fintransfer
      SPRING_DATASOURCE_PASSWORD: fintransfer
      JWT_SECRET: mude-essa-chave-secreta-em-producao-use-uma-longa
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintransfer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintransfer.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
