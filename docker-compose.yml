services:
  postgres:
    image: postgres:16
    container_name: fintransfer-db
    environment:
      POSTGRES_DB: fintransfer
      POSTGRES_USER: fintransfer
      POSTGRES_PASSWORD: fintransfer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintransfer"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fintransfer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintransfer.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

